<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Theme Park Wait Times Map</title>
    <!-- Include Leaflet.js CSS and JS from CDN -->
    <link rel="stylesheet" href="https://unpkg.com" crossorigin="" />
    <script src="https://unpkg.com" crossorigin=""></script>
    <style>
        /* Force the browser body and map container to fully expand */
        html, body { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden;
            font-family: sans-serif; 
        }
        #map { 
            width: 100%; 
            height: 100%; 
            background-color: #aad3df; /* Temporary background while map loads */
        }
        .wait-label { font-weight: bold; text-align: center; }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // 1. Initialize the map centered near Orlando theme parks
        const map = L.map('map').setView([28.4176, -81.5812], 13);

        // 2. Load open-source map graphics from OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Define your ride database with coordinates and Queue-Times API IDs
        const ridesDatabase = [
            { name: "Space Mountain", lat: 28.4192, lon: -81.5771, parkId: 6, apiId: 472 },
            { name: "Seven Dwarfs Mine Train", lat: 28.4202, lon: -81.5803, parkId: 6, apiId: 473 },
            { name: "Big Thunder Mountain", lat: 28.4211, lon: -81.5847, parkId: 6, apiId: 466 },
            { name: "Guardians of the Galaxy: Cosmic Rewind", lat: 28.3748, lon: -81.5501, parkId: 5, apiId: 16183 },
            { name: "Hagrid's Motorbike Adventure", lat: 28.4728, lon: -81.4711, parkId: 64, apiId: 4578 },
            { name: "VelociCoaster", lat: 28.4721, lon: -81.4729, parkId: 64, apiId: 15335 }
        ];

        // 4. Fetch live wait times grouped by unique Park IDs
        async function loadWaitTimes() {
            const uniqueParkIds = [...new Set(ridesDatabase.map(ride => ride.parkId))];
            const liveData = {};

            for (const parkId of uniqueParkIds) {
                try {
                    // FIXED: Wrapping the URL with a free CORS proxy to avoid browser blocking
                    const targetUrl = `https://queue-times.com{parkId}/queue_times.json`;
                    const response = await fetch(`https://corsproxy.io{encodeURIComponent(targetUrl)}`);
                    const data = await response.json();
                    
                    // Flatten the API's land structure into a simple ID lookup dictionary
                    if (data.lands) {
                        data.lands.forEach(land => {
                            land.rides.forEach(ride => {
                                liveData[ride.id] = {
                                    waitTime: ride.wait_time,
                                    isOpen: ride.is_open
                                };
                            });
                        });
                    }
                } catch (error) {
                    console.error(`Failed to fetch wait times for park ${parkId}:`, error);
                }
            }

            // 5. Plot the coordinates onto the map with live API data
            ridesDatabase.forEach(ride => {
                const liveRide = liveData[ride.apiId];
                let statusText = "No Data";
                
                if (liveRide) {
                    statusText = liveRide.isOpen ? `${liveRide.waitTime} mins` : "Closed";
                }

                // Create a marker and bind a interactive popup
                const marker = L.marker([ride.lat, ride.lon]).addTo(map);
                marker.bindPopup(`
                    <div class="wait-label">
                        <h3>${ride.name}</h3>
                        <p><strong>Wait Time:</strong> ${statusText}</p>
                    </div>
                `);
            });
        }

        // Run the function when the page loads
        loadWaitTimes();
        
        // Force Leaflet to recalculate sizes in case container dimensions changed on load
        setTimeout(() => { map.invalidateSize(); }, 200);
    </script>
</body>
</html>
