<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Live Ride Map & Tracker</title>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --status-green: #2ec4b6;
            --status-yellow: #ff9f1c;
            --status-red: #e71d36;
            --bg-color: #f8f9fa;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        header {
            height: 60px;
            background: #111;
            color: white;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        header h1 { 
            margin: 0; 
            font-size: 18px; 
        }

        .nav-link {
            color: #2ec4b6; 
            text-decoration: none; 
            font-weight: bold;
            font-size: 14px;
            margin-right: 15px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        #main-workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 60px);
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        #map {
            flex: 1;
            height: 100%;
            background: #e5e9f0;
            z-index: 1;
        }

        #rides-side-panel {
            width: 360px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-sizing: border-box;
        }

        .panel-header {
            padding: 15px;
            background: #f1f3f5;
            border-bottom: 1px solid #e9ecef;
            font-weight: bold;
            font-size: 15px;
            color: #495057;
        }

        #ride-cards-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ride-sidebar-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .ride-sidebar-card:hover {
            border-color: #007aff;
            background-color: #f0f7ff;
        }

        .ride-sidebar-card.active-highlight {
            border-color: #007aff;
            background-color: #e6f2ff;
            box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
        }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #212529;
        }

        .card-badge {
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 12px;
            color: white;
            white-space: nowrap;
        }

        .custom-pin {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px !important;
            height: 30px !important;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 11px;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .bg-green { background-color: var(--status-green); }
        .bg-yellow { background-color: var(--status-yellow); }
        .bg-red { background-color: var(--status-red); }
        .bg-closed { background-color: #6c757d; }

        .popup-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 2px;
        }
        
        @media (max-width: 768px) {
            #main-workspace { flex-direction: column; }
            #rides-side-panel { width: 100%; height: 220px; }
        }
    </style>
</head>
<body>

<div id="app-container">
    <header>
        <h1>Orlando Live Ride Map</h1>
        <div class="header-right">
            <a href="index.html" class="nav-link">← Standalone List</a>
            <select id="parkSelect">
                <option value="75ea578a-adc8-4116-a54d-dccb60765ef9" data-lat="28.4161" data-lng="-81.5812">Magic Kingdom</option>
                <option value="47f90d2c-e191-4239-a466-5892ef59a88b" data-lat="28.3765" data-lng="-81.5521">EPCOT</option>

                <option value="1c84a229-8862-4648-9c71-378ddd2c7693" data-lat="28.3551" data-lng="-81.5901">Animal Kingdom</option>
                <option value="eb3f4560-2383-4a36-9152-6b3e5ed6bc57" data-lat="28.4795" data-lng="-81.4678">Universal Studios Florida</option>
                <option value="267615cc-8943-4c2a-ae2c-5da728ca591f" data-lat="28.4714" data-lng="-81.4703">Islands of Adventure</option>
                <option value="12dbb85b-265f-44e6-bccf-f1faa17211fc" data-lat="28.4422" data-lng="-81.4490">Epic Universe</option>
                <option value="27d64dee-d85e-48dc-ad6d-8077445cd946" data-lat="28.4101" data-lng="-81.4608">SeaWorld Orlando</option>
                <option value="9e2867f8-68eb-454f-b367-0ed0fd72d72a" data-lat="28.4065" data-lng="-81.4632">Aquatica Orlando</option>
            </select>
        </div>
    </header>

    <div id="main-workspace">
        <div id="map"></div>
        <div id="rides-side-panel">
            <div class="panel-header">Attractions & Wait Times</div>
            <div id="ride-cards-container"></div>
        </div>
    </div>
</div>

<!-- Leaflet Map JS Engine -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

        "popeye & bluto's bilge-rat barges": { lat: 28.4701, lng: -81.4744 },
        "doctor doom's fearfall": { lat: 28.4703, lng: -81.4709 },
        "the cat in the hat": { lat: 28.4712, lng: -81.4689 },
        "high in the sky seuss trolley train ride": { lat: 28.4716, lng: -81.4691 },
        "one fish, two fish, red fish, blue fish": { lat: 28.4710, lng: -81.4692 },
        "caro-seuss-el": { lat: 28.4713, lng: -81.4696 },
        "flight of the hippogriff": { lat: 28.4735, lng: -81.4736 },
        "storm force accelatron": { lat: 28.4703, lng: -81.4719 }
    };

    function findCustomCoordinates(name) {
        if (!name || typeof name !== 'string') return null;
        const cleanName = name.toLowerCase().trim()
            .replace(/[\u2018\u2019]/g, "'")
            .replace(/[\u201c\u201d]/g, '"');
        
        if (hardcodedLocations[cleanName]) return hardcodedLocations[cleanName];

        for (const key in hardcodedLocations) {
            if (cleanName.includes(key) || key.includes(cleanName)) {
                return hardcodedLocations[key];
            }
        }
        return null;
    }

    // Wrap initialization cleanly back into standard DOM lifecycle hooks
    document.addEventListener("DOMContentLoaded", function() {
        const map = L.map('map', {
            zoomControl: true,
            fadeAnimation: true
        }).setView([28.4161, -81.5812], 14);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            maxZoom: 20,
            attribution: '© OpenStreetMap, © CARTO'
        }).addTo(map);

        let markerLayerGroup = L.layerGroup().addTo(map);
        const parkSelectDropdown = document.getElementById('parkSelect');
        const cardsContainer = document.getElementById('ride-cards-container');

        async function updateMapAndSidebar() {
            if (!parkSelectDropdown || !cardsContainer) return;

            const parkId = parkSelectDropdown.value;
            const selectedOption = parkSelectDropdown.options[parkSelectDropdown.selectedIndex];
            const parkLat = parseFloat(selectedOption.getAttribute('data-lat')) || 28.4161;
            const parkLng = parseFloat(selectedOption.getAttribute('data-lng')) || -81.5812;
            
            map.invalidateSize();
            map.flyTo([parkLat, parkLng], 15, { animate: true, duration: 1.2 });
            
            markerLayerGroup.clearLayers();
            cardsContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#666;">Mapping landmark coordinates...</div>';

            try {
                const [liveResponse, staticResponse] = await Promise.all([
                    fetch(`https://api.themeparks.wiki/v1/entity/${parkId}/live`).catch(() => null),
                    fetch(`https://api.themeparks.wiki/v1/entity/${parkId}`).catch(() => null)
                ]);

                if (!liveResponse) {
                    cardsContainer.innerHTML = '<div style="padding:20px; text-align:center; color:red;">Data sync dropped.</div>';
                    return;
                }

                const liveData = await liveResponse.json().catch(() => null);
                const staticData = staticResponse ? await staticResponse.json().catch(() => null) : null;

                if (!liveData || !liveData.liveData) {
                    cardsContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#666;">No live data available.</div>';
                    return;
                }

                const apiCoordinateRegistry = {};
                if (staticData && staticData.children) {
                    staticData.children.forEach(child => {
                        if (child && child.id && child.location && child.location.latitude && child.location.longitude) {
                            apiCoordinateRegistry[child.id] = {
                                lat: child.location.latitude,
                                lng: child.location.longitude
                            };
                        }
                    });
                }

                const rides = liveData.liveData.filter(item => item && item.entityType === "ATTRACTION" && item.name);
                if (rides.length === 0) {
                    cardsContainer.innerHTML = '<div style="padding:20px; text-align:center; color:#666;">No active attractions.</div>';
                    return;
                }

                rides.sort((a, b) => a.name.localeCompare(b.name));
                cardsContainer.innerHTML = '';

                rides.forEach((ride, index) => {
                    let waitText = "-";
                    let colorClass = "bg-closed";
                    let statusLabel = "Closed";
                    
                    const isOperating = ride.status === "OPERATING";
                    const standbyWait = ride.queue?.STANDBY?.waitTime;

                    if (isOperating && standbyWait !== undefined && standbyWait !== null) {
                        waitText = standbyWait;
                        statusLabel = `${standbyWait} min`;
                        if (standbyWait <= 15) colorClass = "bg-green";
                        else if (standbyWait <= 30) colorClass = "bg-yellow";
                        else colorClass = "bg-red";
                    } else if (ride.status === "DOWN") {
                        waitText = "✖";
                        colorClass = "bg-red";
                        statusLabel = "DOWN";
                    }

                    let rideLat, rideLng;
                    const customCoords = findCustomCoordinates(ride.name);

                    if (customCoords) {
                        rideLat = customCoords.lat;
                        rideLng = customCoords.lng;
                    } else if (apiCoordinateRegistry[ride.id]) {
                        rideLat = apiCoordinateRegistry[ride.id].lat;
                        rideLng = apiCoordinateRegistry[apiCoordinateRegistry[ride.id]];
                    } else {
                        const angle = (index / rides.length) * 2 * Math.PI;
                        const radius = 0.0030; 
                        rideLat = parkLat + (Math.sin(angle) * radius);
                        rideLng = parkLng + (Math.cos(angle) * radius);
                    }

                    const customIcon = L.divIcon({
                        className: `custom-pin ${colorClass}`,
                        html: `<span>${waitText}</span>`,
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    const marker = L.marker([rideLat, rideLng], { icon: customIcon });
                    marker.bindPopup(`
                        <div class="popup-title">${ride.name}</div>
                        <div style="font-size:12px; color:#555;">Wait Time: <b>${statusLabel}</b></div>
                    `);
                    
                    markerLayerGroup.addLayer(marker);

                    const card = document.createElement('div');
                    card.className = 'ride-sidebar-card';
                    card.id = `card-${ride.id}`;
                    card.innerHTML = `
                        <span class="card-name">${ride.name}</span>
                        <span class="card-badge ${colorClass}">${statusLabel}</span>
                    `;

                    card.addEventListener('click', () => {
                        document.querySelectorAll('.ride-sidebar-card').forEach(c => c.classList.remove('active-highlight'));
                        card.classList.add('active-highlight');
                        map.setView([rideLat, rideLng], 17);
                        marker.openPopup();
                    });

                    marker.on('click', () => {
                        document.querySelectorAll('.ride-sidebar-card').forEach(c => c.classList.remove('active-highlight'));
                        const matchingCard = document.getElementById(`card-${ride.id}`);
                        if (matchingCard) {
                            matchingCard.classList.add('active-highlight');
                            matchingCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    });

                    cardsContainer.appendChild(card);
                });

                map.invalidateSize();

            } catch (err) {
                console.error("Data thread error caught safely:", err);
                cardsContainer.innerHTML = '<div style="padding:20px; color:var(--status-red);">Error displaying stream elements.</div>';
            }
        }

        parkSelectDropdown.addEventListener('change', updateMapAndSidebar);
        setTimeout(updateMapAndSidebar, 200);
    });
</script>

</body>
</html>
