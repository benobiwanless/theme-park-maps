<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Live Ride Map Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --status-green: #2ec4b6;
            --status-yellow: #ff9f1c;
            --status-red: #e71d36;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow: hidden;
        }

        /* Top Header Navigation */
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #111;
            color: white;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-sizing: border-box;
        }

        header h1 { 
            margin: 0; 
            font-size: 18px; 
        }

        .nav-link {
            color: #2ec4b6; 
            text-decoration: none; 
            font-weight: bold;
            font-size: 14px;
            margin-right: 15px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            border: none;
            cursor: pointer;
        }

        /* Fixed absolute positioning prevents rendering collapse */
        #map {
            position: absolute;
            top: 60px;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
            background: #f0f2f5;
        }

        /* Custom Map Pin Styles */
        .custom-pin {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 32px !important;
            height: 32px !important;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 11px;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.5);
        }

        .bg-green { background-color: var(--status-green); }
        .bg-yellow { background-color: var(--status-yellow); }
        .bg-red { background-color: var(--status-red); }
        .bg-closed { background-color: #555555; }

        .popup-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-status {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<header>

            <option value="267615cc-8943-4c2a-ae2c-5da728ca591f" data-lat="28.4712" data-lng="-81.4715">Islands of Adventure</option>
            <option value="12dbb85b-265f-44e6-bccf-f1faa17211fc" data-lat="28.4422" data-lng="-81.4490">Epic Universe</option>
        </select>
    </div>
</header>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
