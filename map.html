<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orlando Live Ride Map & Tracker</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --status-green: #2ec4b6;
            --status-yellow: #ff9f1c;
            --status-red: #e71d36;
            --bg-color: #f8f9fa;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        header {
            height: 60px;
            background: #111;
            color: white;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-sizing: border-box;
            flex-shrink: 0;
        }

        header h1 { 
            margin: 0; 
            font-size: 18px; 
        }

        .nav-link {
            color: #2ec4b6; 
            text-decoration: none; 
            font-weight: bold;
            font-size: 14px;
            margin-right: 15px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            background: #fff;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }

        #main-workspace {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 60px);
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        #map {
            flex: 1;
            height: 100%;
            background: #e5e9f0;
            z-index: 1;
        }

        #rides-side-panel {
            width: 360px;
            height: 100%;
            background: white;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
            box-sizing: border-box;
        }

        .panel-header {
            padding: 15px;
            background: #f1f3f5;
            border-bottom: 1px solid #e9ecef;
            font-weight: bold;
            font-size: 15px;
            color: #495057;
        }

        #ride-cards-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ride-sidebar-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .ride-sidebar-card:hover {
            border-color: #007aff;
            background-color: #f0f7ff;
        }

        .ride-sidebar-card.active-highlight {
            border-color: #007aff;
            background-color: #e6f2ff;
            box-shadow: 0 0 0 2px rgba(0,122,255,0.2);
        }

        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #212529;
        }

        .card-badge {
            font-size: 12px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 12px;
            color: white;
            white-space: nowrap;
        }

        .custom-pin {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30px !important;
            height: 30px !important;
            border-radius: 50%;
            color: white;
            font-weight: bold;
            font-size: 11px;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            text-shadow: 1px 1px 0px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .bg-green { background-color: var(--status-green); }
        .bg-yellow { background-color: var(--status-yellow); }
        .bg-red { background-color: var(--status-red); }
        .bg-closed { background-color: #6c757d; }

        .popup-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 2px;
        }
        
        @media (max-width: 768px) {
            #main-workspace { flex-direction: column; }
            #rides-side-panel { width: 100%; height: 220px; }
        }
    </style>
</head>
